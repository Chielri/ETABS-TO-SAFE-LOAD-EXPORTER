name: Build Windows Executable

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install "comtypes>=1.3.1,<1.4.2" "pyinstaller>=6.0"

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name ETABStoSAFE etabs_to_safe_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETABStoSAFE
          path: dist/ETABStoSAFE.exe

      - name: Commit exe to repo
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          copy dist\ETABStoSAFE.exe ETABStoSAFE.exe
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ETABStoSAFE.exe
          git diff --cached --quiet || git commit -m "Update ETABStoSAFE.exe [skip ci]"
          git push

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ETABStoSAFE.exe
